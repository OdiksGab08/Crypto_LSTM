<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto AI Predictor</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            font-weight: 700;
        }

        h1,
        h2 {
            font-weight: 700;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            margin: 50px auto;
            max-width: 900px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .form-select,
        .btn-primary {
            font-weight: 700;
            margin: 5px;
        }

        .btn-primary {
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            border: none;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 114, 255, 0.5);
        }

        .prediction-box {
            margin-top: 20px;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }

        #loading {
            margin-top: 15px;
            display: none;
            font-weight: 700;
            color: #fff;
        }

        canvas {
            background: #fff;
            border-radius: 10px;
            margin-top: 30px;
            padding: 15px;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>🚀 Crypto AI Predictor</h1>
        <h2 class="text-muted">7-Day Forecast</h2>

        <!-- Selection -->
        <div class="d-flex justify-content-center flex-wrap">
            <select class="form-select w-auto" id="cryptoSelect">
                <option value="bitcoin">Bitcoin</option>
                <option value="ethereum">Ethereum</option>
                <option value="litecoin">Litecoin</option>
                <option value="tether">Tether (USDT)</option>
                <option value="solana">Solana (SOL)</option>

            </select>
            <button class="btn btn-primary" onclick="getPrediction()">Predict</button>
        </div>

        <!-- Loading spinner -->
        <div id="loading">
            <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div>
            <p>Fetching predictions...</p>
        </div>

        <!-- Predictions -->
        <div class="prediction-box">
            <p id="currentPrice"></p>
            <p id="nextPrediction"></p>
        </div>

        <!-- Chart -->
        <canvas id="forecastChart"></canvas>
    </div>

    <footer>Crypto Prediction Dashboard &copy; 2026</footer>

    <script>
        let chartInstance = null;

        // Default chart data on page load
        function createDefaultChart() {
            const ctx = document.getElementById("forecastChart").getContext("2d");
            const defaultLabels = ["Day 1", "Day 2", "Day 3", "Day 4", "Day 5", "Day 6", "Day 7"];
            const defaultData = [0, 0, 0, 0, 0, 0, 0]; // Blank placeholders

            chartInstance = new Chart(ctx, {
                type: "line",
                data: {
                    labels: defaultLabels,
                    datasets: [{
                        label: "7-Day Forecast",
                        data: defaultData,
                        borderColor: "#0072ff",
                        backgroundColor: "rgba(0,198,255,0.2)",
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: "#000", font: { weight: 'bold', size: 14 } } } },
                    scales: {
                        x: { ticks: { color: "#000", font: { weight: 'bold' } } },
                        y: { ticks: { color: "#000", font: { weight: 'bold' } } }
                    }
                }
            });
        }

        // Call default chart on page load
        createDefaultChart();

        // Fetch prediction and update chart
        async function getPrediction() {
            try {
                document.getElementById("loading").style.display = "block";

                const crypto = document.getElementById("cryptoSelect").value;

                const response = await fetch("/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ crypto: crypto })
                });

                const data = await response.json();
                document.getElementById("loading").style.display = "none";

                const currentPrice = Number(data.current_price);
                const nextPrediction = Number(data.next_prediction);

                // Display prices
                const currentElem = document.getElementById("currentPrice");
                currentElem.innerText = `Current Price: $${currentPrice.toFixed(2)}`;
                const nextElem = document.getElementById("nextPrediction");
                nextElem.innerText = `Next Day Prediction: $${nextPrediction.toFixed(2)}`;
                nextElem.style.color = nextPrediction > currentPrice ? "#4caf50" : nextPrediction < currentPrice ? "#f44336" : "#ffffff";

                // Update chart
                if (chartInstance) chartInstance.destroy();

                const ctx = document.getElementById("forecastChart").getContext("2d");
                chartInstance = new Chart(ctx, {
                    type: "line",
                    data: {
                        labels: data.dates,
                        datasets: [
                            { label: "7-Day Forecast", data: data.forecast, borderColor: "#0072ff", backgroundColor: "rgba(0,198,255,0.2)", fill: true, tension: 0.3 },
                            { label: "Current Price", data: new Array(data.dates.length).fill(currentPrice), borderColor: "#f44336", borderDash: [5, 5], fill: false }
                        ]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { labels: { color: "#000", font: { weight: 'bold', size: 14 } } } },
                        scales: {
                            x: { ticks: { color: "#000", font: { weight: 'bold' } } },
                            y: { ticks: { color: "#000", font: { weight: 'bold' } } }
                        }
                    }
                });

            } catch (error) {
                console.error("Prediction Error:", error);
                document.getElementById("loading").style.display = "none";
                alert("Something went wrong. Check console.");
            }
        }
    </script>
</body>

</html>
